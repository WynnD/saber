name: sbn2pdf
description: CLI tool to convert Saber .sbn2 notes to PDF without Flutter.
version: 0.1.0
publish_to: none

environment:
  sdk: "^3.10.0"

dependencies:
  args: ^2.4.0
  bson: ^5.0.0
  fixnum: ^1.1.0
  pdf: ^3.8.4
  perfect_freehand: ^1.0.4

dev_dependencies:
  lints: ^6.1.0
  test: ^1.24.0
